name: Publish ESLint Config

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: make install
      - run: make qa
      - run: npm publish --access public --provenance
